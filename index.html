<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>今天吃什麼？</title>
<!-- fonts loaded locally via system stack for reliability -->
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans TC',BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .8s,color .4s;}

/* ══ THEMES ══ */
/* 1. 粉嫩春日 */
/* ── 🌸 春日 (light pink) ── */
body.t-sakura{background:linear-gradient(150deg,#FFF0F5,#FFE8F5 40%,#FFF8E8);
  --c1:#E8509A;--c2:#FF9F43;--c3:#C0185A;--c4:#F7C8DC;
  --bg:rgba(255,255,255,.72);--card:rgba(255,255,255,.70);--bdr:#F7C8DC;
  --tbg:rgba(255,248,252,.80);--ton:linear-gradient(135deg,#FFE0EE,#FFD0E4);--tonbdr:#E8509A;
  --grid:rgba(232,80,154,.04);--txt:#6A0030;--inp:rgba(255,255,255,.92);
  --glow1:rgba(255,140,190,.5);--glow2:rgba(255,180,80,.4);--glow3:rgba(220,80,140,.35);}
body.t-sakura h1{color:#E8509A;text-shadow:0 0 8px rgba(232,80,154,.3);}

/* ── 🍵 和風 (light matcha) ── */
body.t-matcha{background:linear-gradient(150deg,#F5FAF0,#EDF5E5 40%,#F8F5EE);
  --c1:#3D7A28;--c2:#A07830;--c3:#285018;--c4:#C8E0B8;
  --bg:rgba(248,252,244,.74);--card:rgba(248,252,244,.72);--bdr:#C8E0B8;
  --tbg:rgba(242,250,236,.82);--ton:linear-gradient(135deg,#D8EEC8,#CCDAB8);--tonbdr:#3D7A28;
  --grid:rgba(61,122,40,.04);--txt:#1A3A10;--inp:rgba(255,255,255,.92);
  --glow1:rgba(80,180,60,.35);--glow2:rgba(180,140,60,.3);--glow3:rgba(60,160,40,.25);}
body.t-matcha h1{color:#3D7A28;text-shadow:0 0 8px rgba(61,122,40,.3);}

/* ── ⚡ 電子 (dark teal) ── */
body.t-cyber{background:linear-gradient(150deg,#030810,#050C18 40%,#030810);
  --c1:#00FFD1;--c2:#00AAFF;--c3:#80FFE8;--c4:#002840;
  --bg:rgba(3,8,16,.86);--card:rgba(4,10,20,.90);--bdr:#00FFD122;
  --tbg:rgba(5,12,24,.84);--ton:linear-gradient(135deg,#021020,#030810);--tonbdr:#00FFD1;
  --grid:rgba(0,255,209,.04);--txt:#A0F0E8;--inp:rgba(3,8,16,.92);
  --glow1:rgba(0,255,209,.55);--glow2:rgba(0,170,255,.45);--glow3:rgba(0,200,180,.35);}
body.t-cyber h1{color:#00FFD1;text-shadow:0 0 10px #00FFD188,0 0 24px #00FFD144;}

/* ── 🔥 琥珀熔岩 (dark orange) ── */


/* ── 💙 電光藍海 (dark blue) ── */
body.t-punk{background:linear-gradient(150deg,#000414,#000820 50%,#000310);
  --c1:#0088FF;--c2:#00CCFF;--c3:#44AAFF;--c4:#001840;
  --bg:rgba(0,4,18,.88);--card:rgba(0,3,14,.92);--bdr:#0088FF28;
  --tbg:rgba(0,6,24,.84);--ton:linear-gradient(135deg,#001030,#000414);--tonbdr:#0088FF;
  --grid:rgba(0,136,255,.05);--txt:#99CCFF;--inp:rgba(0,4,18,.92);
  --glow1:rgba(0,136,255,.65);--glow2:rgba(0,204,255,.50);--glow3:rgba(0,80,220,.40);}
body.t-punk h1{color:#0088FF;text-shadow:0 0 10px #0088FF88,0 0 24px #00CCFF44;}

/* ── 💗 量子洋紅 (dark magenta) ── */
body.t-quantum{background:radial-gradient(ellipse at 50% 0%,#140010,#0A0008 60%,#06000A);
  --c1:#FF00AA;--c2:#FF44DD;--c3:#FF88EE;--c4:#300020;
  --bg:rgba(14,0,10,.88);--card:rgba(10,0,8,.92);--bdr:#FF00AA28;
  --tbg:rgba(20,0,14,.84);--ton:linear-gradient(135deg,#200018,#0C000A);--tonbdr:#FF00AA;
  --grid:rgba(255,0,170,.05);--txt:#FFB8EE;--inp:rgba(14,0,10,.92);
  --glow1:rgba(255,0,170,.65);--glow2:rgba(255,68,221,.50);--glow3:rgba(200,0,150,.40);}
body.t-quantum h1{color:#FF00AA;text-shadow:0 0 10px #FF00AA88,0 0 24px #FF44DD44;}

/* ── 🌌 星雲宇宙 (dark purple) ── */
body.t-nebula{background:radial-gradient(ellipse at 20% 30%,#0C001C,#060010 50%,#020008);
  --c1:#CF6BFF;--c2:#6BB8FF;--c3:#E8A8FF;--c4:#1C0038;
  --bg:rgba(8,0,18,.88);--card:rgba(6,0,14,.92);--bdr:#CF6BFF22;
  --tbg:rgba(12,0,24,.84);--ton:linear-gradient(135deg,#14002A,#060010);--tonbdr:#CF6BFF;
  --grid:rgba(207,107,255,.04);--txt:#D8B8FF;--inp:rgba(8,0,20,.92);
  --glow1:rgba(207,107,255,.60);--glow2:rgba(107,184,255,.50);--glow3:rgba(160,60,255,.40);}
body.t-nebula h1{color:#CF6BFF;text-shadow:0 0 12px #CF6BFF88,0 0 28px #6BB8FF44;}

/* ── 🩸 深紅煉獄 (dark red) ── */
body.t-ice{background:linear-gradient(150deg,#0E0000,#160000 50%,#0A0000);
  --c1:#FF2040;--c2:#FF6060;--c3:#FF4060;--c4:#2A0008;
  --bg:rgba(14,0,0,.88);--card:rgba(10,0,0,.92);--bdr:#FF204030;
  --tbg:rgba(20,0,4,.84);--ton:linear-gradient(135deg,#200008,#100002);--tonbdr:#FF2040;
  --grid:rgba(255,32,64,.05);--txt:#FFB0B8;--inp:rgba(14,0,2,.92);
  --glow1:rgba(255,32,64,.65);--glow2:rgba(255,80,80,.50);--glow3:rgba(200,0,30,.40);}
body.t-ice h1{color:#FF2040;text-shadow:0 0 10px #FF204088,0 0 24px #FF606044;}

/* ── 🔮 銀河白銀 (light silver) ── */
body.t-ui{background:linear-gradient(150deg,#F8F8FC,#F0F0F8 50%,#F5F5FA);
  --c1:#6060A0;--c2:#9090C0;--c3:#404080;--c4:#D8D8EE;
  --bg:rgba(248,248,252,.82);--card:rgba(255,255,255,.88);--bdr:#C8C8E0;
  --tbg:rgba(242,242,250,.86);--ton:linear-gradient(135deg,#E8E8F4,#DCDCEE);--tonbdr:#6060A0;
  --grid:rgba(96,96,160,.04);--txt:#202040;--inp:rgba(255,255,255,.95);
  --glow1:rgba(96,96,160,.30);--glow2:rgba(144,144,192,.25);--glow3:rgba(80,80,140,.20);}
body.t-ui h1{color:#6060A0;text-shadow:0 0 8px rgba(96,96,160,.3);}

/* ── 🔬 未來實驗室 (dark green) ── */
body.t-lab{background:linear-gradient(150deg,#020A04,#040E06 50%,#020804);
  --c1:#00FF66;--c2:#00CC44;--c3:#80FFB0;--c4:#003310;
  --bg:rgba(2,8,4,.88);--card:rgba(3,10,5,.92);--bdr:#00FF6622;
  --tbg:rgba(4,12,6,.84);--ton:linear-gradient(135deg,#041408,#020804);--tonbdr:#00FF66;
  --grid:rgba(0,255,102,.05);--txt:#80FFB0;--inp:rgba(3,10,5,.92);
  --glow1:rgba(0,255,102,.60);--glow2:rgba(0,200,60,.50);--glow3:rgba(0,150,40,.40);}
body.t-lab h1{color:#00FF66;text-shadow:0 0 10px #00FF6688,0 0 22px #00CC4444;}
/* grid lines */
/* grid lines removed */
/* scanlines removed */

/* ── 檸檬汽水 ── */
body.t-lemon{background:linear-gradient(150deg,#FEFFF0,#F8FFD8 40%,#FFFFFB);
  --c1:#8AB800;--c2:#F5C400;--c3:#5A8000;--c4:#E8F8B0;
  --bg:rgba(252,255,240,.78);--card:rgba(255,255,248,.84);--bdr:#D4EE80;
  --tbg:rgba(245,252,220,.84);--ton:linear-gradient(135deg,#EEFFA0,#E0F880);--tonbdr:#8AB800;
  --grid:rgba(138,184,0,.04);--txt:#2A3A00;--inp:rgba(255,255,252,.95);
  --glow1:rgba(138,184,0,.35);--glow2:rgba(245,196,0,.3);--glow3:rgba(180,220,0,.25);}
body.t-lemon h1{color:#8AB800;text-shadow:0 0 8px rgba(138,184,0,.3);}
/* ── 棉花糖 ── */
body.t-candy{background:linear-gradient(150deg,#FFF0F8,#F8F0FF 40%,#F0F8FF);
  --c1:#E060A0;--c2:#60C0E0;--c3:#C04080;--c4:#F8D0EC;
  --bg:rgba(255,248,252,.76);--card:rgba(255,252,255,.84);--bdr:#F0C0E0;
  --tbg:rgba(252,244,252,.84);--ton:linear-gradient(135deg,#FFE0F4,#F0D8FF);--tonbdr:#E060A0;
  --grid:rgba(224,96,160,.04);--txt:#4A1040;--inp:rgba(255,255,255,.95);
  --glow1:rgba(224,96,160,.35);--glow2:rgba(96,192,224,.3);--glow3:rgba(180,80,160,.25);}
body.t-candy h1{color:#E060A0;text-shadow:0 0 8px rgba(224,96,160,.35);}
/* ── 蜜桃橘 ── */
body.t-peach{background:linear-gradient(150deg,#FFF8F0,#FFF0E0 40%,#FFF5EC);
  --c1:#E87828;--c2:#F0B040;--c3:#C05010;--c4:#FFD8B0;
  --bg:rgba(255,252,248,.78);--card:rgba(255,254,250,.84);--bdr:#FFD0A0;
  --tbg:rgba(255,248,238,.84);--ton:linear-gradient(135deg,#FFE8C8,#FFD8A8);--tonbdr:#E87828;
  --grid:rgba(232,120,40,.04);--txt:#4A1A00;--inp:rgba(255,255,255,.95);
  --glow1:rgba(232,120,40,.35);--glow2:rgba(240,176,64,.3);--glow3:rgba(200,80,20,.25);}
body.t-peach h1{color:#E87828;text-shadow:0 0 8px rgba(232,120,40,.3);}
/* ── 地中海 ── */
body.t-aegean{background:linear-gradient(150deg,#EEF8FF,#E0F4FC 40%,#F0FAFF);
  --c1:#0080C0;--c2:#00B8E0;--c3:#005890;--c4:#B8E4F8;
  --bg:rgba(238,248,255,.78);--card:rgba(248,253,255,.84);--bdr:#A8D8F0;
  --tbg:rgba(228,245,255,.84);--ton:linear-gradient(135deg,#D0EEFF,#B8E4F8);--tonbdr:#0080C0;
  --grid:rgba(0,128,192,.04);--txt:#002840;--inp:rgba(255,255,255,.95);
  --glow1:rgba(0,128,192,.35);--glow2:rgba(0,184,224,.3);--glow3:rgba(0,100,170,.25);}
body.t-aegean h1{color:#0080C0;text-shadow:0 0 8px rgba(0,128,192,.35);}
/* ── 薰衣草田 ── */
body.t-lavender{background:linear-gradient(150deg,#F8F0FF,#F2E8FF 40%,#FAF0FF);
  --c1:#8040C0;--c2:#C080E0;--c3:#6020A0;--c4:#E8D0F8;
  --bg:rgba(250,244,255,.78);--card:rgba(255,252,255,.84);--bdr:#DCC0F4;
  --tbg:rgba(246,238,255,.84);--ton:linear-gradient(135deg,#EDD8FF,#E0C8FF);--tonbdr:#8040C0;
  --grid:rgba(128,64,192,.04);--txt:#280848;--inp:rgba(255,255,255,.95);
  --glow1:rgba(128,64,192,.35);--glow2:rgba(192,128,224,.3);--glow3:rgba(100,40,160,.25);}
body.t-lavender h1{color:#8040C0;text-shadow:0 0 8px rgba(128,64,192,.35);}

/* bg layer */
#bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-food{position:absolute;user-select:none;}
.bg-glow{position:absolute;border-radius:50%;animation-timing-function:ease-in-out;animation-iteration-count:infinite;}
.bg-code{position:absolute;font-family:'Share Tech Mono',monospace;font-size:.6rem;
  user-select:none;line-height:1.7;animation:codeRain linear infinite;writing-mode:vertical-rl;}
.bg-star{position:absolute;border-radius:50%;animation:starTwinkle ease-in-out infinite;}
.bg-bubble{position:absolute;border-radius:50%;border:1px solid rgba(100,200,255,.3);
  animation:bubbleRise linear infinite;}
.bg-aurora{position:absolute;border-radius:50%;filter:blur(60px);opacity:.2;
  animation:auroraDrift ease-in-out infinite;}

#app{max-width:560px;width:100%;margin:0 auto;padding:52px clamp(10px,4vw,20px) 60px;position:relative;z-index:2;box-sizing:border-box;}
/* ── Responsive ── */


html{-webkit-text-size-adjust:100%;text-size-adjust:100%;font-size:16px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

/* ── Header ── */
header{text-align:center;padding:18px 0 8px;animation:fsd .5s ease both;}
.subtitle{font-size:.72rem;color:var(--c2);font-weight:700;letter-spacing:2px;margin-bottom:4px;}
h1{font-size:2rem;font-weight:900;color:var(--c3);letter-spacing:3px;}
.title-deco{color:var(--c4);letter-spacing:8px;margin-top:3px;font-size:.82rem;}
body.t-cyber h1,body.t-retro h1,body.t-aurora h1{font-family:'Share Tech Mono',monospace;}
body.t-cyber h1{color:#00FFD1;text-shadow:0 0 8px #00FFD1,0 0 20px #00FFD155;animation:glitch1 4s ease-in-out infinite;}
body.t-retro h1{color:#FF00AA;text-shadow:0 0 8px #FF00AA,0 0 20px #FFE60055;animation:glitch2 5s ease-in-out infinite;}








/* ── Theme selector ── */
.theme-corner{position:fixed;top:10px;left:10px;z-index:9000;max-width:calc(100vw - 20px);}
.theme-toggle-btn{display:inline-flex;align-items:center;gap:4px;
  padding:7px 9px;background:var(--bg);border:1.5px solid var(--bdr);
  border-radius:20px;cursor:pointer;font-family:inherit;
  color:var(--c3);box-shadow:0 2px 12px rgba(0,0,0,.2);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:border-color .2s,box-shadow .2s;}
.theme-toggle-btn:hover{border-color:var(--c1);box-shadow:0 3px 18px rgba(0,0,0,.28);}
#theme-cur-name{font-size:.75rem;}
#theme-arrow{font-size:.65rem;opacity:.55;transition:transform .25s;}
#theme-arrow.open{transform:rotate(180deg);}
.theme-grid{display:none;position:absolute;top:calc(100% + 8px);left:0;
  flex-wrap:wrap;gap:8px;justify-content:flex-start;
  width:min(260px, calc(100vw - 24px));
  padding:12px 14px;background:var(--card);border:1.5px solid var(--bdr);
  border-radius:14px;box-shadow:0 6px 28px rgba(0,0,0,.22);animation:psin .2s ease;z-index:9002;}
.theme-grid.open{display:flex;}
.tg-label{font-size:.58rem;font-weight:700;color:var(--c2);opacity:.85;}
.tdot-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.tdot{width:24px;height:24px;border-radius:50%;border:2.5px solid transparent;transition:transform .2s,box-shadow .2s;}
.tdot:hover{transform:scale(1.2);}
.tdot.on{border-color:rgba(255,255,255,.9);box-shadow:0 0 0 2px var(--c1),0 2px 10px rgba(0,0,0,.4);}
.tdot[data-t="sakura"]{background:conic-gradient(#FF9BBD,#FFB06B,#FF9BBD);}
.tdot[data-t="matcha"]{background:conic-gradient(#3D7A28,#F5FAF0,#A07830);}
.tdot[data-t="cyber"]{background:conic-gradient(#00FFD1,#030810,#00AAFF,#050C18);}
.tdot[data-t="punk"]{background:conic-gradient(#0088FF,#000414,#00CCFF,#000820);}
.tdot[data-t="quantum"]{background:conic-gradient(#FF00AA,#140010,#FF44DD,#0A0008);}
.tdot[data-t="nebula"]{background:conic-gradient(#CF6BFF,#060010,#6BB8FF,#0C001C);}
.tdot[data-t="ice"]{background:conic-gradient(#FF2040,#0E0000,#FF6060,#160000);}
.tdot[data-t="ui"]{background:conic-gradient(#9090C0,#F8F8FC,#6060A0,#F0F0F8);}
.tdot[data-t="lab"]{background:conic-gradient(#00FF66,#020A04,#00CC44,#040E06);}
.tdot[data-t="lemon"]{background:conic-gradient(#8AB800,#FEFFF0,#F5C400,#F8FFD8);}
.tdot[data-t="candy"]{background:conic-gradient(#E060A0,#FFF0F8,#60C0E0,#F0F8FF);}
.tdot[data-t="peach"]{background:conic-gradient(#E87828,#FFF8F0,#F0B040,#FFF0E0);}
.tdot[data-t="aegean"]{background:conic-gradient(#0080C0,#EEF8FF,#00B8E0,#E0F4FC);}
.tdot[data-t="lavender"]{background:conic-gradient(#8040C0,#F8F0FF,#C080E0,#F2E8FF);}
.tlabel{font-size:.58rem;font-weight:700;color:var(--c3);opacity:.75;text-align:center;}
/* cat chip delete btn */
.ccx{background:none;border:none;color:rgba(220,30,30,.45);cursor:pointer;
  font-size:.72rem;padding:0 2px;line-height:1;margin-left:3px;transition:color .12s;}
.ccx:hover{color:#D32F2F;}
/* category manage chips */
.cmg-chip{display:inline-flex;align-items:stretch;
  background:var(--card);border:1.5px solid var(--bdr);border-radius:22px;
  overflow:hidden;cursor:default;transition:border-color .18s,box-shadow .18s;
  animation:cin .18s both;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.cmg-chip:hover{border-color:var(--c1);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.cmg-chip.cmg-active{border-color:var(--c1);background:var(--tbg);}
.cmg-body{display:inline-flex;align-items:center;gap:5px;cursor:pointer;
  padding:5px 8px 5px 10px;transition:background .12s;}
.cmg-body:hover{background:rgba(128,128,128,.08);}
.cmg-emo{font-size:.95rem;line-height:1;flex-shrink:0;}
.cmg-lbl{font-size:.72rem;font-weight:600;color:var(--txt);white-space:nowrap;
  max-width:90px;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em;}
.cmg-div{width:1px;background:var(--bdr);flex-shrink:0;margin:5px 0;}
.cmg-x{background:none;border:none;cursor:pointer;line-height:1;
  color:rgba(160,40,40,.4);padding:0 9px;transition:all .12s;
  display:flex;align-items:center;font-size:1rem;font-weight:300;}
.cmg-x:hover{color:#CC2222;background:rgba(200,0,0,.07);}
.ccx-standalone{background:rgba(200,0,0,.08);border:1px solid rgba(200,0,0,.2);
  color:rgba(200,0,0,.6);cursor:pointer;font-size:.68rem;width:20px;height:20px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  line-height:1;transition:all .15s;flex-shrink:0;padding:0;}
.ccx-standalone:hover{background:rgba(200,0,0,.18);color:#C62828;border-color:rgba(200,0,0,.4);}
/* extra bg fx */
.bg-lightning{position:absolute;pointer-events:none;width:2px;border-radius:1px;
  background:linear-gradient(to bottom,transparent,var(--c1),transparent);
  animation:lightning .15s ease-in-out forwards;}
@keyframes lightning{0%{opacity:0;transform:scaleY(0)}40%{opacity:1;transform:scaleY(1)}100%{opacity:0;transform:scaleY(1)}}
.bg-ripple{position:absolute;border-radius:50%;border:2px solid;
  animation:rippleOut 1.5s ease-out forwards;}
@keyframes rippleOut{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}
.bg-petal{position:absolute;user-select:none;animation:petalFall linear infinite;}
@keyframes petalFall{0%{transform:translateY(-5%) rotate(0deg) scale(1);opacity:0}
  10%{opacity:.7}80%{opacity:.5}100%{transform:translateY(110vh) rotate(360deg) scale(.8);opacity:0}}

/* ── Meal grid ── */
.meal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;
  background:var(--bg);border-radius:14px;padding:6px;border:1.5px solid var(--bdr);
  box-shadow:0 2px 16px rgba(0,0,0,.1);animation:fsd .5s .1s ease both;}
.meal-btn{padding:8px 3px;border-radius:10px;border:none;background:transparent;color:var(--c3);
  opacity:.42;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;font-family:inherit;}
.meal-btn:hover:not(.on){opacity:.7;background:rgba(128,128,128,.12);}
.meal-btn.on{background:var(--ton);opacity:1;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.meal-icon{font-size:1.2rem;}.meal-label{font-size:.8rem;font-weight:700;color:var(--c3);}
.meal-time{font-size:.54rem;opacity:.5;color:var(--txt);}

/* ── Tabs ── */
.tabs{display:flex;gap:8px;margin-bottom:10px;animation:fsd .5s .15s ease both;}
.tab{flex:1;padding:10px 5px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--tbg);
  color:var(--c3);opacity:.42;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .22s;font-family:inherit;;min-height:44px;}
.tab:hover:not(.on){opacity:.65;}

/* dice overlay */

.dice-box,/* ── Scratch reveal overlay ── */

}
.scratch-title{

}
.scratch-cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;padding:8px 0;position:relative;}
/* Each card */
.scard{
  width:100%;height:clamp(80px,28vw,110px);
  border-radius:14px;cursor:pointer;
  perspective:600px;flex-shrink:0;
}
.scard-lg{width:140px;height:170px;}

  transition:transform .42s cubic-bezier(.4,0,.2,1);
}
.scard.flipped .scard-inner{ transform:rotateY(180deg); }
.scard-front,.scard-back{
  position:absolute;inset:0;border-radius:14px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.scard-front{

}
.scard-front::after{
  content:"?";font-size:2rem;font-weight:900;color:rgba(255,255,255,.75);
}
/* ── 非金色：銀邊微螢光 ── */
.scard-back{
  transform:rotateY(180deg);

}

/* ── 金色卡：螢光效果 ── */

}

}

@keyframes silverPulse{

  50%{box-shadow:0 0 0 2px rgba(200,220,255,.9),0 0 20px 6px rgba(160,190,255,.55),0 0 35px 10px rgba(180,200,255,.25),0 6px 18px rgba(0,0,0,.22);}
}
@keyframes goldPulse{
  0%,100%{box-shadow:0 0 0 2px #FFD700,0 0 14px 4px rgba(255,210,0,.7),0 0 30px 8px rgba(255,160,0,.4),0 8px 24px rgba(0,0,0,.3);}

/* ══ KEYFRAMES ══ */

/* ── Cat group shop list ── */

/* ══ 輪到你了 overlay ══ */
#who-overlay{
  position:fixed;inset:0;z-index:9990;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(20,10,50,.93) 0%,rgba(0,0,0,.82) 100%);
  -webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  animation:fadeIn .2s ease;
}
#who-overlay.hide{display:none;}
.who-box{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;
  max-width:330px;width:92vw;
  animation:diceIn .35s cubic-bezier(.34,1.5,.64,1) both;
}
.who-close-btn{
  position:absolute;top:-6px;right:-6px;
  width:26px;height:26px;border-radius:50%;border:none;

.who-title{

}
/* chips */

.who-chip{
  display:flex;align-items:center;gap:5px;

  background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.22);
  color:#fff;font-size:.82rem;font-weight:600;cursor:default;
  transition:background .15s;
}

.wc-x{cursor:pointer;opacity:.5;font-size:.72rem;line-height:1;padding:1px 2px;}
.wc-x:hover{opacity:1;}
/* add row */
.who-add-row{display:flex;gap:7px;width:100%;min-width:0;}
.who-inp{
  flex:1;min-width:0;padding:8px 12px;border-radius:10px;

}

.who-inp:focus{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.16);}
.who-add-btn{
  padding:8px 14px;border-radius:10px;border:none;
  background:rgba(255,255,255,.18);color:#fff;font-weight:900;cursor:pointer;font-size:1rem;
  transition:background .15s;
}
.who-add-btn:hover{background:rgba(255,255,255,.28);}
/* draw button */
.who-draw-btn{
  width:100%;padding:11px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#a855f7,#6366f1);
  color:#fff;font-size:.95rem;font-weight:900;cursor:pointer;
  box-shadow:0 4px 18px rgba(140,80,255,.45);
  transition:transform .12s,box-shadow .12s;
  font-family:inherit;letter-spacing:.5px;
}

/* draw area */
.who-draw-area{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;}
.who-draw-area.hide{display:none;}
.who-mgmt.hide{display:none;}
/* Stage: bouncing name bubbles */
.who-stage{
  width:100%;height:130px;position:relative;overflow:hidden;
  border-radius:14px;background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.12);
}

  position:absolute;border-radius:24px;
  padding:6px 14px;font-weight:700;color:#fff;font-size:.9rem;

}

@keyframes bubbleFloat{
  0%{transform:translate(0,0) scale(1);}

  60%{transform:scale(1.18) rotate(3deg);}

/* ══ MEAL ══ */
function renderMealGrid(){
  const g=document.getElementById("meal-grid");g.innerHTML="";
  MT.forEach(m=>{
    const b=document.createElement("button");b.className="meal-btn"+(meal===m.key?" on":"");
    b.innerHTML=`<span class="meal-icon">${m.icon}</span><b class="meal-label">${m.label}</b><span class="meal-time">${m.time}</span>`;
    b.onclick=()=>{meal=m.key;selCats=[];sq=[];showSF=false;renderAll();};
    g.appendChild(b);
  });
}

/* ══ MODE ══ */
function switchMode(m){
  mode=m;
  Array.prototype.slice.call(document.querySelectorAll(".tab")).forEach(t=>(t.dataset.mode===m?t.classList.add("on"):t.classList.remove("on")));
  const isExplore=m==="explore", isWho=m==="who";
  // ex-strip
  const strip=document.getElementById("ex-strip");
  if(strip){isExplore?strip.classList.remove("hide"):strip.classList.add("hide");};
  // who-panel
  const wp=document.getElementById("who-panel");
  if(wp){isWho?wp.classList.remove("hide"):wp.classList.add("hide");};
  // filter-box hidden in who mode
  const fb=document.getElementById("filter-box");
  if(fb)fb.style.display=isWho?"none":"";
  // main-card
  const mc=document.getElementById("main-card");
  if(mc)mc.style.display=(isExplore||isWho)?"none":"";
  // add panels
  const apr=document.getElementById("add-panel-random");
  const ape=document.getElementById("add-panel-explore");
  if(apr)apr.style.display=m==="random"&&showCP?"block":"none";
  if(ape)ape.style.display=isExplore&&showCP?"block":"none";

function filtS(){

function pickNext(pool){

  if(sqId!==pid){sqId=pid;sq=[];}
  if(!sq.length){const a=[...pool];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}sq=a;}
  return sq.shift();
}

/* FIX 3: all reels spin simultaneously; FIX 4: total time 3.5-4s */
function doSpin(){
  if(phase==="spinning")return;
  const pool=filtS();if(!pool.length){toast("此餐別尚無店家，請先新增","err");return;}
  cancelAnimationFrame(raf);
  const fin=pickNext(pool);phase="spinning";setSlotUI("spinning");
  function bstrip(pool,w){
    const rep=Math.max(3,Math.ceil(40/pool.length));let arr=[];for(let i=0;i<rep;i++)arr=arr.concat(pool);
    const wi=arr.length-4;arr[wi]={...w};return{strip:arr,tY:Math.max(CH,wi*CH-CH)};
  }
  const built=[bstrip(pool,fin),bstrip(pool,fin),bstrip(pool,fin)];
  built.forEach(({strip},ri)=>{
    const rw=document.getElementById("rw"+ri);if(!rw)return;rw.innerHTML="";
    const tr=document.createElement("div");tr.className="rtrack";tr.id="rt"+ri;
    strip.forEach(item=>{
      const cell=document.createElement("div");cell.className="rcell";cell.style.height=CH+"px";
      if(ri!==1)cell.innerHTML=`<span class="emo">${item.emoji||"🍽️"}</span>`;
      else{const n=item.name||"?",s=n.length>6?n.slice(0,6)+"…":n;cell.innerHTML=`<span class="nm" style="font-size:${n.length>4?"0.88rem":"1rem"}">${s}</span>`;}
      tr.appendChild(cell);
    });
    rw.appendChild(tr);rt[ri]=tr;
  });

  // FIX 3: all start together; FIX 4: center at 3.5s, sides at 3.8s
  // se = fast spin phase end, de = decelerate end (settle time)
  const PLAN=[
    {se:2600,de:3800}, // left emoji: settles at 3.8s
    {se:2400,de:3500}, // center name: settles at 3.5s (first, ~0.3s before sides)
    {se:2600,de:3800}, // right emoji: settles at 3.8s
  ];
  const t0=performance.now();const ys=[0,0,0];let lk=[false,false,false];
  function animate(now){
    const elapsed=now-t0;let allDone=true;
    for(let ri=0;ri<3;ri++){
      if(lk[ri])continue;allDone=false;
      const{se,de}=PLAN[ri];const tr=rt[ri];if(!tr)continue;
      const tLen=built[ri].strip.length*CH,tY=built[ri].tY;let y;
      if(elapsed<se){y=(30*(elapsed/(1000/60)))%tLen;ys[ri]=y;}
      else if(elapsed<de){const t=(elapsed-se)/(de-se);let d=tY-ys[ri];if(d<0)d+=tLen;y=(ys[ri]+d*eqt(Math.min(t,1)))%tLen;}
      else{
        y=tY;tr.style.transform=`translateY(-${y}px)`;lk[ri]=true;
        const oe=document.getElementById("ro"+ri),fe=document.getElementById("wf"+ri);
        if(oe)oe.classList.add("l"+ri);if(fe)fe.classList.add("lk");
        const lh=document.createElement("div");lh.className="lhrt";
        lh.style.color=ri===1?"var(--c2)":"var(--c1)";lh.textContent=ri===1?"✓":"♥";
        oe&&oe.appendChild(lh);
        if(ri===1){renderRC(fin);spawnParticles();}
        if(lk[0]&&lk[1]&&lk[2]){phase="done";setSlotUI("done");}
        continue;
      }
      tr.style.transform=`translateY(-${y}px)`;
    }
    if(!allDone)raf=requestAnimationFrame(animate);
  }
  raf=requestAnimationFrame(animate);
}

function setSlotUI(p){
  const cab=document.getElementById("cab"),sb=document.getElementById("sbar"),btn=document.getElementById("spbtn");
  if(cab)cab.className="cabinet "+p;
  if(sb)sb.innerHTML=p==="idle"?'<span class="si">✨ 按下開始抽獎 ✨</span>':p==="spinning"?'<span class="ss">🎲 轉動中…</span>':'<span class="sd">🎉 就決定是你了！</span>';

}

function renderShops(){
  const el=document.getElementById("shop-list");if(!el)return;

/* ══ EXPLORE ══ */
function burl(q){return`https://www.google.com/maps/search/${encodeURIComponent(q)}`;}
function openMaps(url){
  const a=document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function openEx(){
  const cc=cats[meal]||[],ml={breakfast:"早餐",lunch:"餐廳",drink:"下午茶",supper:"宵夜"}[meal];

}
function openCQ(){
  const v=(document.getElementById("cq")||{value:""}).value.trim();
  if(!v){toast("請輸入關鍵字","err");return;}
  openMaps(burl(v));
}

// Global state for openRE (so doOpen can be called from onclick)
var _reOverlay=null,_reRow=null,_reOpened=false,_reSearchKw="";
function doOpen(){
  if(_reOpened)return; _reOpened=true;
  if(_reOverlay)_reOverlay.classList.add("hide");
  if(_reRow)_reRow.innerHTML="";
  openMaps(burl(_reSearchKw));
}

function openRE(){
  const cc=cats[meal]||[];
  const pool=selCats.length>0?cc.filter(function(ct){return selCats.includes(ct.id);}):cc;
  if(!pool.length){toast("此餐別尚無分類可探索","err");return;}

  // Build 3 strictly unique cards from pool
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  const seen=new Set();
  const displayCards=[];
  for(const ct of shuffled){
    if(!seen.has(ct.id)){ seen.add(ct.id); displayCards.push(ct); }
    if(displayCards.length>=3) break;
  }

  // winner is one of the 3 displayed cards (pre-decided, secret)
  const picked=displayCards[Math.floor(Math.random()*displayCards.length)];
  _reSearchKw=picked.kw||picked.label;
  _reOpened=false;

  const overlay=document.getElementById("dice-overlay");
  const resultEl=document.getElementById("dice-result");
  const subEl=document.getElementById("dice-sub");
  const titleEl=document.getElementById("scratch-title");
  const rowEl=document.getElementById("scratch-cards");
  _reOverlay=overlay; _reRow=rowEl;
  overlay.classList.remove("hide");
  resultEl.innerHTML=""; rowEl.innerHTML="";
  if(subEl)subEl.textContent="請選一張牌";
  if(titleEl)titleEl.textContent="✨ 今天吃什麼？";

  let chosen=false;

  function revealAll(){
    const allCards=rowEl.querySelectorAll(".scard");
    allCards.forEach(function(card,i){
      if(!card.classList.contains("flipped")){
        setTimeout(function(){card.classList.add("flipped");}, i*90);
      }
    });
    const allDone=90*2+440;
    setTimeout(function(){
      if(titleEl)titleEl.textContent="🎉 今天就吃這個！";
      resultEl.innerHTML=
        '<div style="font-size:2.4rem;line-height:1;margin-bottom:4px;animation:resultPop .35s cubic-bezier(.34,1.8,.64,1)">'+picked.emoji+'</div>'+
        '<div style="font-size:1.1rem;font-weight:900;color:#fff;animation:resultPop .35s .06s cubic-bezier(.34,1.6,.64,1) both">'+picked.label+'</div>'+
        '<button onclick="doOpen()" style="margin-top:10px;padding:10px 22px;border-radius:12px;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#000;font-weight:800;font-size:.9rem;cursor:pointer;font-family:inherit;box-shadow:0 3px 14px rgba(0,0,0,.3)">📍 開啟 Google Maps</button>';
      if(subEl)subEl.textContent="";
    }, allDone);
  }

  const renderOrder=[...displayCards].sort(()=>Math.random()-.5);
  renderOrder.forEach(function(cat){
    const isWinner=(cat.id===picked.id);
    const card=document.createElement("div");
    card.className="scard";
    card.innerHTML='<div class="scard-inner"><div class="scard-front"></div><div class="scard-back'+(isWinner?' winner':'')+'"><span class="sc-emo">'+cat.emoji+'</span><span class="sc-lbl">'+cat.label+'</span></div></div>';
    card.onclick=function(){
      if(chosen) return;
      chosen=true;
      card.classList.add("flipped","chosen");
      if(subEl)subEl.textContent="";
      setTimeout(revealAll, 800);
    };
    rowEl.appendChild(card);
  });

  overlay.onclick=function(e){
    if(e.target.closest(".scard")) return;
    if(chosen) doOpen();
  };
}

/* ══ TOAST ══ */
function toast(msg,type){
  const el=document.getElementById("toast");if(!el)return;
  el.textContent=msg;
  el.style.background=type==="err"?"#C62828":"#2E7D32";
  el.style.opacity="1";
  el.style.transform="translateX(-50%) translateY(0)";
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity="0";el.style.transform="translateX(-50%) translateY(20px)";},2200);
}
/* ══ 輪到你了 ══ */
const WHO_COLORS=['#a855f7','#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#f97316','#06b6d4'];
let whoNames=JSON.parse(localStorage.getItem('meal_who_names')||'[]');
let whoMode='pay'; // 'pay' or 'run'
function saveWho(){localStorage.setItem('meal_who_names',JSON.stringify(whoNames));}

function setWhoMode(m){
  whoMode=m;
  (m==='pay'?document.getElementById('wmb-pay').classList.add('on'):document.getElementById('wmb-pay').classList.remove('on'));
  (m==='run'?document.getElementById('wmb-run').classList.add('on'):document.getElementById('wmb-run').classList.remove('on'));
  const title=document.getElementById('who-game-title');
  const desc=document.getElementById('who-game-desc');
  if(m==='pay'){
    if(title)title.textContent='💸 買單GO !';
  } else {
    if(title)title.textContent='🛵 跑腿GO !';
  }
  if(desc)desc.style.display='none';
  // Stop current draw and reset UI only
  whoFlashStop();
}

function whoFlashStop(){
  cancelAnimationFrame(flashRaf);
  const nameEl=document.getElementById('who-spotlight-name');
  const ring=document.getElementById('who-spotlight-ring');
  if(nameEl){nameEl.textContent='？';nameEl.style.color='var(--txt)';nameEl.style.animation='none';nameEl.className='who-spotlight-name';}
  if(ring)ring.style.background='transparent';
  const res=document.getElementById('who-result');
  if(res)res.innerHTML='';
  const sb=document.getElementById('who-start-btn');
  if(sb){sb.style.display='';sb.disabled=false;}
  document.getElementById('who-reset-btn').classList.add('hide');
}

function renderWhoChips(){
  const box=document.getElementById('who-chips');
  if(!box)return; box.innerHTML='';
  whoNames.forEach((n,i)=>{
    const ch=document.createElement('div');
    ch.className='who-chip';
    ch.style.borderColor=WHO_COLORS[i%WHO_COLORS.length]+'99';
    ch.innerHTML=`<span>${n}</span><span class="wc-x" onclick="whoRemove(${i})">✕</span>`;
    ch.querySelector('span:first-child').ondblclick=()=>whoEdit(i);
    box.appendChild(ch);
  });
}
function whoAdd(){
  const inp=document.getElementById('who-inp');
  const v=(inp.value||'').trim();
  if(!v)return;
  if(!whoNames.includes(v))whoNames.push(v);
  saveWho();inp.value='';renderWhoChips();
}
function whoRemove(i){whoNames.splice(i,1);saveWho();renderWhoChips();}
function whoEdit(i){
  const n=prompt('修改名字',whoNames[i]);
  if(n&&n.trim()){whoNames[i]=n.trim();saveWho();renderWhoChips();}
}

/* ── Spotlight Flash Draw ── */
let flashRaf=null;

function whoFlashReset(){
  cancelAnimationFrame(flashRaf);
  // directly restart draw
  whoFlashStart();
}

function whoFlashStart(){
  if(whoNames.length<2){toast('請先加入至少 2 位參與者','err');return;}
  const sb=document.getElementById('who-start-btn');
  sb.style.display='none';
  document.getElementById('who-reset-btn').classList.add('hide');
  document.getElementById('who-result').innerHTML='';
  const nameEl=document.getElementById('who-spotlight-name');
  const ring=document.getElementById('who-spotlight-ring');
  nameEl.style.animation='none';

  // 3.5 ~ 4 seconds random
  const TOTAL=3500+Math.random()*500;
  const start=performance.now();
  let lastSwitch=start;
  let curIdx=Math.floor(Math.random()*whoNames.length);
  const winner=whoNames[Math.floor(Math.random()*whoNames.length)];

  function frame(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/TOTAL,1);
    const switchMs=80+(500-80)*Math.pow(progress,.6);

    if(now-lastSwitch>=switchMs){
      lastSwitch=now;
      if(progress>0.8){
        const remaining=Math.round((1-progress)/0.2*3);
        if(remaining<=1){
          curIdx=whoNames.indexOf(winner);
        } else {
          curIdx=(curIdx+1+Math.floor(Math.random()*(whoNames.length-1)))%whoNames.length;
        }
      } else {
        curIdx=(curIdx+1+Math.floor(Math.random()*(whoNames.length-1)))%whoNames.length;
      }
      const color=WHO_COLORS[curIdx%WHO_COLORS.length];
      nameEl.textContent=whoNames[curIdx];
      nameEl.style.color=color;
      nameEl.className='who-spotlight-name flash';
      ring.style.background=color+'22';
      requestAnimationFrame(()=>{ nameEl.className='who-spotlight-name'; });
    }

    if(progress<1){
      flashRaf=requestAnimationFrame(frame);
    } else {
      const winIdx=whoNames.indexOf(winner);
      const winColor=WHO_COLORS[winIdx%WHO_COLORS.length];
      nameEl.textContent=winner;
      nameEl.style.color=winColor;
      ring.style.background=winColor+'33';
      nameEl.style.animation='whoWin .5s cubic-bezier(.34,1.6,.64,1)';

      const label=whoMode==='pay'?'買單囉~':'跑腿囉~';
      const emoji=whoMode==='pay'?'💸':'🛵';
      setTimeout(()=>{
        document.getElementById('who-result').innerHTML=`
          <div style="font-size:.9rem;color:var(--c2);font-weight:700;margin-top:6px;
            animation:fadeIn .4s ease">${emoji} ${winner} ${label} 🎉</div>`;
        document.getElementById('who-reset-btn').classList.remove('hide');
      },400);
    }
  }

  nameEl.textContent=whoNames[curIdx];
  nameEl.style.color=WHO_COLORS[curIdx%WHO_COLORS.length];
  flashRaf=requestAnimationFrame(frame);
}
